<body><div id="root"></div>
<div id="installbar" style="display:none;position:fixed;left:0;right:0;bottom:0;z-index:50;padding:12px 14px calc(12px + env(safe-area-inset-bottom));background:#2E4A2A;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,.25)">
  <div style="flex:1"><div style="font-weight:800;font-size:15px">Install Essembl</div><div style="font-size:12px;opacity:.85">Add it to your home screen</div></div>
  <button id="installbtn" style="background:#fff;color:#2E4A2A;font-weight:800;border:none;border-radius:999px;padding:10px 18px;font-size:14px">Install</button>
  <button id="installclose" style="background:transparent;color:#fff;border:none;font-size:20px;opacity:.8;padding:4px 8px">&times;</button>
</div>
<div id="iosguide" style="display:none;position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.55);font-family:'Plus Jakarta Sans',sans-serif" >
  <div style="position:absolute;left:16px;right:16px;bottom:16px;background:#fff;border-radius:22px;padding:20px">
    <div style="font-weight:800;font-size:18px;color:#171717;margin-bottom:8px">Add to Home Screen</div>
    <div style="font-size:14px;color:#555;line-height:1.5">Tap the <b>Share</b> button in your browser, then choose <b>“Add to Home Screen”</b>. Essembl will appear as an app icon.</div>
    <button id="iosok" style="margin-top:16px;width:100%;background:#2E4A2A;color:#fff;font-weight:800;border:none;border-radius:999px;padding:13px;font-size:15px">Got it</button>
  </div>
</div>
<script>
(function(){
  if ("serviceWorker" in navigator) { window.addEventListener("load", function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); }); }
  var deferred = null;
  var bar = document.getElementById("installbar");
  var btn = document.getElementById("installbtn");
  var closeBtn = document.getElementById("installclose");
  var ios = document.getElementById("iosguide");
  var standalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
  function isiOS(){ return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream; }
  window.addEventListener("beforeinstallprompt", function(e){ e.preventDefault(); deferred = e; if(!standalone) bar.style.display="flex"; });
  btn.addEventListener("click", function(){
    if (deferred){ deferred.prompt(); deferred.userChoice.finally(function(){ deferred=null; bar.style.display="none"; }); }
    else if (isiOS()){ ios.style.display="block"; }
  });
  closeBtn.addEventListener("click", function(){ bar.style.display="none"; });
  document.getElementById("iosok").addEventListener("click", function(){ ios.style.display="none"; });
  window.addEventListener("appinstalled", function(){ bar.style.display="none"; });
  // iOS has no beforeinstallprompt: show the bar so users get instructions
  if (isiOS() && !standalone){ setTimeout(function(){ bar.style.display="flex"; }, 1200); }
})();
